<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bestiary — Realms of Legacy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Literata:wght@400;600;700&display=swap" rel="stylesheet" />

  <!-- DataTables -->
  <link rel="stylesheet" href="https://cdn.datatables.net/1.13.8/css/jquery.dataTables.min.css">
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>
  <!-- Papa Parse -->
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --void: #04060f;
      --deep: #080d1c;
      --mid: #0d1630;
      --surface: #111b3a;
      --border: rgba(100,160,255,0.15);
      --border-gold: rgba(201,168,76,0.25);
      --cyan: #4fc3f7;
      --gold: #c9a84c;
      --gold-pale: #e8d5a3;
      --text: #c8d8f0;
      --text-dim: #7a90b8;
      --white: #eef2ff;
      --font-display: 'Cinzel Decorative', serif;
      --font-heading: 'Cinzel', serif;
      --font-body: 'Crimson Pro', serif;
      --font-table: 'Literata', Georgia, serif;
    }

    html { scroll-behavior: smooth; }
    body {
      background-color: var(--void);
      background-image:
        radial-gradient(ellipse 70% 50% at 15% 20%, rgba(30,60,160,0.15) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 85% 60%, rgba(79,195,247,0.06) 0%, transparent 60%);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 1rem;
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ─── Nav ─── */
    nav { background: rgba(4,6,15,0.97); border-bottom: 1px solid var(--border); backdrop-filter: blur(12px); padding: 1rem 2rem; display: flex; align-items: center; justify-content: space-between; gap: 1rem; position: sticky; top: 0; z-index: 100; }
    .nav-logo { font-family: var(--font-display); font-size: 1rem; color: var(--gold); text-decoration: none; white-space: nowrap; }
    .nav-links { display: flex; list-style: none; gap: 0.25rem; flex-wrap: wrap; justify-content: flex-end; }
    .nav-links a { color: var(--text-dim); text-decoration: none; font-family: var(--font-heading); font-size: 0.7rem; letter-spacing: 0.1em; text-transform: uppercase; padding: 0.35rem 0.65rem; border-radius: 3px; transition: color 0.2s, background 0.2s; }
    .nav-links a:hover, .nav-links a.active { color: var(--cyan); background: rgba(79,195,247,0.07); }
    .nav-toggle { display: none; background: none; border: 1px solid var(--border); color: var(--cyan); padding: 0.4rem 0.6rem; border-radius: 4px; cursor: pointer; font-size: 1.1rem; }
    @media (max-width: 720px) {
      .nav-toggle { display: block; }
      .nav-links { display: none; position: absolute; top: 100%; left: 0; right: 0; background: rgba(4,6,15,0.98); border-bottom: 1px solid var(--border); flex-direction: column; padding: 1rem 2rem; gap: 0; }
      .nav-links.open { display: flex; }
      .nav-links a { padding: 0.6rem 0; font-size: 0.85rem; }
    }

    /* ─── Page Header ─── */
    .page-header { max-width: 1300px; margin: 0 auto; padding: 2.5rem 2rem 1.5rem; border-bottom: 1px solid var(--border); }
    .page-header .breadcrumb { font-family: var(--font-heading); font-size: 0.65rem; letter-spacing: 0.25em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 0.6rem; }
    .page-header .breadcrumb a { color: var(--cyan); text-decoration: none; }
    .page-header h1 { font-family: var(--font-display); font-size: clamp(1.5rem, 3vw, 2.2rem); color: var(--white); margin-bottom: 0.5rem; }
    .page-header p { font-size: 1rem; color: var(--text-dim); }

    /* ─── Content wrap ─── */
    .content-wrap { max-width: 1300px; margin: 2rem auto 5rem; padding: 0 2rem; }

    /* ─── Status message ─── */
    #tableStatus {
      font-family: var(--font-heading);
      font-size: 0.78rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-dim);
      padding: 2rem 0;
      text-align: center;
    }

    /* ─── Override DataTables to match site theme ─── */

    /* Wrapper & table */
    .dataTables_wrapper {
      font-family: var(--font-table);
      color: var(--text);
    }

    table#creatureTable {
      border-collapse: collapse;
      width: 100% !important;
      background: rgba(13,22,48,0.75);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }

    table#creatureTable thead tr th {
      background: rgba(8,13,28,0.9) !important;
      color: var(--white) !important;
      font-family: var(--font-heading) !important;
      font-size: 0.72rem !important;
      letter-spacing: 0.12em !important;
      text-transform: uppercase !important;
      padding: 0.85rem 1rem !important;
      border-bottom: 1px solid var(--border-gold) !important;
      border-right: none !important;
      white-space: nowrap;
    }

    table#creatureTable tbody tr {
      background: rgba(13,22,48,0.6);
      transition: background 0.15s;
    }
    table#creatureTable tbody tr:nth-child(even) {
      background: rgba(17,27,58,0.6);
    }
    table#creatureTable tbody tr:hover {
      background: rgba(25,40,80,0.85) !important;
    }
    table#creatureTable tbody tr td {
      padding: 0.75rem 1rem !important;
      border-bottom: 1px solid rgba(100,160,255,0.07) !important;
      border-right: none !important;
      color: var(--text) !important;
      font-size: 0.98rem;
      vertical-align: middle;
    }
    table#creatureTable tbody tr td:first-child {
      font-family: var(--font-heading);
      font-size: 0.85rem;
      letter-spacing: 0.04em;
      color: var(--white) !important;
    }

    /* DataTables sort arrows */
    table.dataTable thead .sorting:before,
    table.dataTable thead .sorting_asc:before,
    table.dataTable thead .sorting_desc:before,
    table.dataTable thead .sorting:after,
    table.dataTable thead .sorting_asc:after,
    table.dataTable thead .sorting_desc:after {
      color: var(--text-dim) !important;
    }
    table.dataTable thead .sorting_asc:before,
    table.dataTable thead .sorting_desc:after {
      color: var(--gold) !important;
    }

    /* Search box */
    .dataTables_filter label {
      font-family: var(--font-heading);
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-dim);
    }
    .dataTables_filter input {
      background: rgba(8,13,28,0.8) !important;
      border: 1px solid var(--border) !important;
      border-radius: 4px !important;
      color: var(--white) !important;
      font-family: var(--font-body) !important;
      font-size: 0.95rem !important;
      padding: 0.35rem 0.65rem !important;
      margin-left: 0.5rem;
      outline: none;
    }
    .dataTables_filter input:focus {
      border-color: rgba(79,195,247,0.45) !important;
      box-shadow: 0 0 0 2px rgba(79,195,247,0.08) !important;
    }

    /* Length select */
    .dataTables_length label {
      font-family: var(--font-heading);
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-dim);
    }
    .dataTables_length select {
      background: rgba(8,13,28,0.8) !important;
      border: 1px solid var(--border) !important;
      border-radius: 4px !important;
      color: var(--white) !important;
      font-family: var(--font-body) !important;
      padding: 0.2rem 0.5rem !important;
      margin: 0 0.4rem;
    }
    .dataTables_length select option { background: #0d1630; }

    /* Info text */
    .dataTables_info {
      font-family: var(--font-heading);
      font-size: 0.68rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-dim) !important;
      padding-top: 0.75rem !important;
    }

    /* Pagination */
    .dataTables_paginate {
      padding-top: 0.75rem !important;
    }
    .dataTables_paginate .paginate_button {
      font-family: var(--font-heading) !important;
      font-size: 0.68rem !important;
      letter-spacing: 0.08em !important;
      text-transform: uppercase !important;
      color: var(--text-dim) !important;
      background: transparent !important;
      border: 1px solid transparent !important;
      border-radius: 4px !important;
      padding: 0.3rem 0.7rem !important;
      transition: all 0.15s !important;
    }
    .dataTables_paginate .paginate_button:hover {
      background: rgba(79,195,247,0.08) !important;
      border-color: rgba(79,195,247,0.3) !important;
      color: var(--cyan) !important;
    }
    .dataTables_paginate .paginate_button.current,
    .dataTables_paginate .paginate_button.current:hover {
      background: rgba(201,168,76,0.12) !important;
      border-color: rgba(201,168,76,0.4) !important;
      color: var(--gold) !important;
    }
    .dataTables_paginate .paginate_button.disabled,
    .dataTables_paginate .paginate_button.disabled:hover {
      color: rgba(122,144,184,0.3) !important;
      cursor: default !important;
    }

    /* ─── Download buttons ─── */
    .dl-btn {
      display: inline-block;
      font-family: var(--font-heading);
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.3rem 0.75rem;
      border-radius: 4px;
      text-decoration: none;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .dl-btn-png {
      color: var(--gold);
      border: 1px solid rgba(201,168,76,0.35);
      background: rgba(201,168,76,0.06);
    }
    .dl-btn-png:hover { background: rgba(201,168,76,0.15); border-color: var(--gold); }
    .dl-btn-json {
      color: var(--cyan);
      border: 1px solid rgba(79,195,247,0.35);
      background: rgba(79,195,247,0.06);
    }
    .dl-btn-json:hover { background: rgba(79,195,247,0.15); border-color: var(--cyan); }

    /* ─── Filter panel (checkbox dropdowns) ─── */
    .filter-panel {
      background: var(--surface) !important;
      border: 1px solid var(--border) !important;
      border-radius: 6px !important;
      box-shadow: 0 8px 30px rgba(0,0,0,0.4) !important;
      font-family: var(--font-body) !important;
      color: var(--text) !important;
    }
    .filter-panel label { color: var(--text) !important; font-size: 0.9rem; }
    .filter-panel button {
      font-family: var(--font-heading) !important;
      font-size: 0.62rem !important;
      letter-spacing: 0.08em !important;
      text-transform: uppercase !important;
      background: rgba(8,13,28,0.6) !important;
      border: 1px solid var(--border) !important;
      color: var(--text-dim) !important;
      border-radius: 4px !important;
      cursor: pointer !important;
      padding: 0.25rem 0.6rem !important;
      transition: all 0.15s !important;
    }
    .filter-panel button:hover { color: var(--white) !important; border-color: rgba(100,160,255,0.35) !important; }
    .filter-panel input[type="checkbox"] { accent-color: var(--cyan); }
    .filter-btn {
      font-family: var(--font-heading) !important;
      font-size: 0.6rem !important;
      letter-spacing: 0.1em !important;
      text-transform: uppercase !important;
      background: rgba(8,13,28,0.6) !important;
      border: 1px solid var(--border) !important;
      color: var(--text-dim) !important;
      border-radius: 4px !important;
      cursor: pointer !important;
      padding: 0.2rem 0.5rem !important;
      transition: all 0.15s !important;
    }
    .filter-btn:hover { color: var(--cyan) !important; border-color: rgba(79,195,247,0.35) !important; }

    /* Responsive table scroll */
    #creatureTableWrapper { overflow-x: auto; }
  </style>
</head>
<body>

<!-- Nav -->
<nav>
  <a href="index.html" class="nav-logo">Realms of Legacy</a>
  <button class="nav-toggle" onclick="this.closest('nav').querySelector('.nav-links').classList.toggle('open')">☰</button>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="index.html#about">The Game</a></li>
    <li><a href="index.html#setting">Setting</a></li>

    <li><a href="bestiary.html" class="active">Bestiary</a></li>
    <li><a href="index.html#get">Get the Game</a></li>
  </ul>
</nav>

<!-- Page Header -->
<div class="page-header">
  <p class="breadcrumb"><a href="index.html">Home</a> &rsaquo; Bestiary</p>
  <h1>NPC Bestiary</h1>
  <p>The full list of NPC stat blocks. Does not include Leviathan or Veilstrider NPCs.</p>
</div>

<!-- Content -->
<div class="content-wrap">
  <div id="creatureTableWrapper">
    <div id="tableStatus">Loading&hellip;</div>
    <table id="creatureTable" class="display" style="width:100%; display:none;">
      <thead>
        <tr>
          <th>Name</th>
          <th>Creature Type</th>
          <th>Theme</th>
          <th>CL</th>
          <th>Description</th>
          <th>Stat Block</th>
          <th>JSON</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<!-- ═══ ORIGINAL LOGIC — verbatim, with themed button classes ═══ -->
<script>
  const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQQB2Tn8_mVtAnFzLnO3-uoSWDjS7eY-w_ZPbRQPnL8bKQDjDk-SEZkBImS83YzHMSrOT5ESqoUiFDC/pub?gid=0&single=true&output=csv";

  function linkButton(url, label, cls) {
    const u = (url || "").trim();
    if (!u) return "";
    const safe = u.replace(/"/g, "&quot;");
    return `<a href="${safe}" target="_blank" rel="noopener noreferrer" class="dl-btn ${cls}">${label}</a>`;
  }

  function setStatus(msg) {
    const el = document.getElementById("tableStatus");
    el.textContent = msg;
    el.style.display = msg ? "block" : "none";
  }

  function addCheckboxFilter(api, colIdx) {
    const column = api.column(colIdx);
    const headerCell = $(column.header());
    const title = headerCell.text();
    headerCell.empty();

    const container = $(`
      <div style="position:relative; display:flex; align-items:center; gap:6px;">
        <span style="font-weight:600;">${title}</span>
        <button type="button" class="filter-btn">Filter ▾</button>
        <div class="filter-panel"
          style="display:none; position:absolute; top:28px; left:0; z-index:9999;
                 padding:10px; min-width:220px; max-height:260px; overflow:auto;">
          <div style="display:flex; gap:8px; margin-bottom:8px;">
            <button type="button" class="select-all">All</button>
            <button type="button" class="clear-all">None</button>
          </div>
          <div class="options"></div>
        </div>
      </div>
    `);

    const button = container.find(".filter-btn");
    const panel = container.find(".filter-panel");
    const optionsDiv = container.find(".options");

    function parseCellValues(cell) {
      return String(cell ?? "").split(",").map(s => s.trim()).filter(Boolean);
    }
    function escapeRegex(s) {
      return String(s).replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    }

    const tokenSet = new Set();
    column.data().each(function(d) { parseCellValues(d).forEach(t => tokenSet.add(t)); });
    const values = Array.from(tokenSet).sort((a,b) => a.localeCompare(b, undefined, { numeric:true, sensitivity:"base" }));

    for (const v of values) {
      optionsDiv.append(`
        <label style="display:flex; align-items:center; gap:8px; margin:4px 0; cursor:pointer;">
          <input type="checkbox" class="opt" value="${v.replace(/"/g, "&quot;")}" checked>
          <span>${v}</span>
        </label>
      `);
    }

    function applyFilter() {
      const checked = optionsDiv.find("input.opt:checked").map(function(){ return $(this).val(); }).get();
      if (checked.length === 0) { column.search("a^", true, false).draw(); return; }
      const escaped = checked.map(escapeRegex).join("|");
      const regex = "(?:^|\\s*,\\s*)(?:" + escaped + ")(?:\\s*,\\s*|$)";
      column.search(regex, true, false).draw();
    }

    button.on("click", function(e){ e.stopPropagation(); $(".filter-panel").not(panel).hide(); panel.toggle(); });
    $(document).on("click", function(){ panel.hide(); });
    panel.on("click", function(e){ e.stopPropagation(); });
    panel.find(".select-all").on("click", function(){ optionsDiv.find("input.opt").prop("checked", true); applyFilter(); });
    panel.find(".clear-all").on("click", function(){ optionsDiv.find("input.opt").prop("checked", false); applyFilter(); });
    optionsDiv.on("change", "input.opt", applyFilter);

    headerCell.append(container);
  }

  function buildTableFromRows(rows) {
    const requiredHeaders = ["Name","Creature Type","Theme","CL","Description","Download Stat Block","Download JSON"];
    const sample = rows[0] || {};
    const missing = requiredHeaders.filter(h => !(h in sample));
    if (missing.length) throw new Error("Missing columns: " + missing.join(", "));

    const tbody = document.querySelector("#creatureTable tbody");
    tbody.innerHTML = "";

    for (const r of rows) {
      const hasAny = requiredHeaders.some(h => String(r[h] ?? "").trim() !== "");
      if (!hasAny) continue;
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td>${(r["Name"] ?? "").toString()}</td>
        <td>${(r["Creature Type"] ?? "").toString()}</td>
        <td>${(r["Theme"] ?? "").toString()}</td>
        <td>${(r["CL"] ?? "").toString()}</td>
        <td>${(r["Description"] ?? "").toString()}</td>
        <td>${linkButton(r["Download Stat Block"], "PNG", "dl-btn-png")}</td>
        <td>${linkButton(r["Download JSON"], "JSON", "dl-btn-json")}</td>
      `;
      tbody.appendChild(tr);
    }

    document.getElementById("creatureTable").style.display = "";
    setStatus("");

    const table = $("#creatureTable").DataTable({
      pageLength: 25,
      columnDefs: [{ targets: [5,6], orderable: false, searchable: false }]
    });

    addCheckboxFilter(table, 1); // Creature Type
    addCheckboxFilter(table, 2); // Theme
    addCheckboxFilter(table, 3); // CL
  }

  (function loadSheet() {
    setStatus("Loading data…");
    Papa.parse(CSV_URL, {
      download: true,
      header: true,
      skipEmptyLines: true,
      complete: function(results) {
        try {
          if (!results.data.length) { setStatus("No rows found."); return; }
          buildTableFromRows(results.data);
        } catch(err) {
          console.error(err);
          setStatus("Error: " + err.message);
        }
      },
      error: function(err) {
        console.error(err);
        setStatus("Failed to load data. Check that the sheet is published as CSV.");
      }
    });
  })();
</script>

</body>
